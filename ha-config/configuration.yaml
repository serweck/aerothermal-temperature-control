# =====================================================================
#  Aerotermia - Backend Home Assistant
#  Pega estos bloques en tu configuration.yaml (o usa packages).
#  Entidades reales:
#    - rele bomba:  switch.socket_garaje_aerotermia_bomba
#    - sensor zona: sensor.temperatura_termostato
#    - motor LG:    climate.bomba_de_calor_aire_agua_2
# =====================================================================

climate:
  # ─────────── CALOR (invierno) ───────────
  - platform: generic_thermostat
    name: Suelo Radiante Calor
    unique_id: suelo_radiante_calor
    heater: switch.socket_garaje_aerotermia_bomba
    target_sensor: sensor.temperatura_termostato
    ac_mode: false            # calienta: bomba ON cuando T < objetivo
    min_temp: 12
    max_temp: 26
    target_temp: 21
    cold_tolerance: 0.3
    hot_tolerance: 0.3
    min_cycle_duration:
      minutes: 10             # protege la bomba de ciclos cortos
    precision: 0.5
    away_temp: 16             # Fuera
    comfort_temp: 21.5        # Confort
    eco_temp: 19.5            # Eco
    home_temp: 20             # En Casa
    sleep_temp: 17            # Dormir

  # ─────────── FRIO (verano) ───────────
  - platform: generic_thermostat
    name: Suelo Radiante Frio
    unique_id: suelo_radiante_frio
    heater: switch.socket_garaje_aerotermia_bomba
    target_sensor: sensor.temperatura_termostato
    ac_mode: true             # enfria: bomba ON cuando T > objetivo
    min_temp: 20
    max_temp: 30
    target_temp: 25
    cold_tolerance: 0.3
    hot_tolerance: 0.3
    min_cycle_duration:
      minutes: 10
    precision: 0.5
    away_temp: 28             # Fuera
    comfort_temp: 22          # Confort
    eco_temp: 25              # Eco
    home_temp: 22             # En Casa
    sleep_temp: 24            # Dormir

input_select:
  aerotermia_modo:
    name: Modo Aerotermia (suelo)
    icon: mdi:hvac
    options:
      - "off"
      - calor
      - frio
